services:
  elasticsearch:
    image: mirror-docker.runflare.com/elasticsearch:9.3.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # dev only!
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: mirror-docker.runflare.com/kibana:9.3.2
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

volumes:
  es_data:
